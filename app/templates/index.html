<!DOCTYPE html>
<html>
<head>
    <title>AI Soccer Prediction</title>
</head>
<body>

<h1>⚽ AI + Statistics Soccer Prediction</h1>

<form method="POST" action="/predict">
    Home Team:<br>
    <input name="team1" required><br><br>

    Away Team:<br>
    <input name="team2" required><br><br>

    <button type="submit">Predict</button>
</form>

{% if final %}

<hr>

<h2>Result</h2>

<p><b>{{ team1 }}</b> vs <b>{{ team2 }}</b></p>

<p>AI: {{ ai }}</p>
<p>Stats: {{ stats }}</p>

<h3>FINAL: {{ final }}</h3>
<p>Confidence: {{ confidence }}%</p>
<p>Score: {{ score }}</p>

{% endif %}

</body>
</html>
